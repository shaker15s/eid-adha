<!-- Script for Timer Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const timerElement = document.getElementById('countdown-timer');
            let timeLeft = 20.0;
            
            const timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    timerElement.classList.add('text-error'); // Turn red on 0
                    timerElement.classList.remove('text-white');
                } else if (timeLeft <= 5.0) {
                    timerElement.classList.add('text-primary-container'); // Turn gold when urgent
                    timerElement.classList.remove('text-white');
                    // Add a mild shake effect class if it existed, or just rely on color
                }

                // Format to 1 decimal place
                timerElement.textContent = timeLeft.toFixed(1);
            }, 100); // Update every 100ms
        });
    </script>
