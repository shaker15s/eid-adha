<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');

        }
        
        .liquid-gradient {
            background: radial-gradient(circle at 50% 50%, rgba(255, 184, 0, 0.15) 0%, rgba(18, 20, 20, 1) 70%);
            filter: blur(60px);
            z-index: 0;

        .premium-glass-card {

            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 0.5px solid rgba(255, 184, 0, 0.5);
            border-left: 0.5px solid rgba(255, 184, 0, 0.5);
        }
        
        .cloud-melt {
            -webkit-mask-image: radial-gradient(circle at center, black 40%, transparent 80%); 
            mask-image: radial-gradient(circle at center, black 40%, transparent 80%);
        }

        .eid-text-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .eid-script-text {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 120px;
            line-height: 1;
            color: white;
            z-index: 2;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            margin-bottom: -10px;
        }

        .mubarak-block-text {
            font-family: 'Anton', sans-serif;
            font-size: 80px;
            line-height: 1;
            color: white;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            z-index: 1;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);

        @media (min-width: 768px) {

                font-size: 180px;
                margin-bottom: -20px;
            }

                font-size: 120px;
            }

    </style>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="antialiased min-h-screen flex flex-col items-center justify-center relative bg-black">
<!-- Cinematic Content Canvas -->
<div class="relative z-10 flex flex-col items-center justify-between w-full max-w-7xl px-gutter md:px-margin-desktop h-screen py-16">
<!-- Top Text Layer -->
<div class="flex flex-col items-center justify-center z-30 select-none mt-8 animate-fade-in-up w-full">
<div class="eid-text-container">
<div class="eid-script-text"><span class="font-arabic">ع</span>id</div>
<div class="mubarak-block-text text-center">MUBARAK</div>
</div>
</div>
<!-- Center Stage: Premium Ram Asset -->
<div class="absolute inset-0 z-20 flex items-center justify-center animate-fade-in-up mt-24" style="animation-delay: 0.1s; pointer-events: none; top: 15%;">
<div class="w-full h-full max-w-md max-h-[40vh] flex items-center justify-center">
<img alt="Royal Ram" class="w-full h-full object-contain animate-zoom-pulse cloud-melt mix-blend-screen" src="https://lh3.googleusercontent.com/aida/ADBb0uh-BwozrWtDadzL19XCUBg3YtCsYijXNEbE59wUYNE9blgTkTw9iPXqbiiSFZxussnpyQWTwMM-Mx3a-rXRsr1RBceTWwAgy4i_qygRfqp2DV0vQlfCTFM0uOBLlz5spfJieW8YfsRlr5jf0-W4p2o-Srj4blaxzNX-jEXFg2Wojb0SxKm0UJ4LettITEAyTI3ai-1-8c_vVT90ZqvfJFmCVc6LAgZBlIA1OHnDL6zmCjpkhXllfbIc73um"/>
</div>
</div>
<!-- Loading Indicator / Subtitle -->
<div class="relative z-30 mb-8 flex flex-col items-center animate-fade-in-up mt-auto" style="animation-delay: 0.3s;">
<div class="flex items-center space-x-3 text-primary">
<span class="material-symbols-outlined animate-spin text-sm" style="font-variation-settings: 'FILL' 1;">sync</span>
<p class="font-label-sm text-label-sm tracking-[0.2em] uppercase text-primary/80">Initiating Hunt...</p>
</div>
<!-- Progress Bar Minimal -->
<div class="w-64 h-[2px] bg-white/10 rounded-full mt-4 overflow-hidden">
<div class="h-full bg-gradient-to-r from-primary/50 via-primary to-primary/50 w-1/3 rounded-full shadow-[0_0_10px_rgba(255,184,0,0.8)] transition-all duration-1000 ease-out"></div>
</div>
</div>
</div>
<script>
        // Minimal interaction: Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            
            const titles = document.querySelectorAll('.eid-text-container');
            const ram = document.querySelector('img');
            
            titles.forEach(title => {
                if(title) title.style.transform = `translate(${xAxis * 1.5}px, ${yAxis * 1.5}px)`;
            });
            if(ram) ram.style.transform = `translate(${xAxis * -0.5}px, ${yAxis * -0.5}px)`;
        });
    </script>
</body></html>
