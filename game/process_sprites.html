<!DOCTYPE html>
<html>
<head>
    <title>Sprite Processor - Background Removal</title>
    <style>
        body { font-family: monospace; background: #111; color: #fff; padding: 20px; }
        canvas { border: 1px solid #333; margin: 8px; max-width: 200px; }
        .row { display: flex; flex-wrap: wrap; gap: 16px; margin: 16px 0; }
        h3 { color: #F5C842; }
        button { padding: 12px 24px; background: #F5C842; color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; margin: 8px; }
        #status { color: #4ADB6C; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🐑 Sprite Background Removal</h1>
    <p>This tool removes white backgrounds from all character sprites and saves them as transparent PNGs in base64.</p>
    <button onclick="processAll()">Process All Sprites</button>
    <div id="status"></div>
    <div id="output" class="row"></div>
    
    <script src="js/assets.js"></script>
    <script>
    const SPRITES = ['sprite_butcher', 'sprite_sheep', 'sprite_child1', 'sprite_child2', 'sprite_child3'];
    
    function removeWhiteBG(imgSrc, threshold = 40, feather = 40) {
        return new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = img.width;
                c.height = img.height;
                const ctx = c.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const imgData = ctx.getImageData(0, 0, c.width, c.height);
                const data = imgData.data;
                
                // Pass 1: Distance-based white removal with feathering
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const distToWhite = Math.sqrt((255-r)**2 + (255-g)**2 + (255-b)**2);
                    
                    if (distToWhite < threshold) {
                        data[i+3] = 0; // Fully transparent
                    } else if (distToWhite < threshold + feather) {
                        const alpha = Math.floor(((distToWhite - threshold) / feather) * 255);
                        data[i+3] = Math.min(data[i+3], alpha);
                    }
                }
                
                // Pass 2: Edge refinement - remove semi-transparent halos
                const w = c.width, h = c.height;
                const tempData = new Uint8ClampedArray(data);
                
                for (let y = 1; y < h - 1; y++) {
                    for (let x = 1; x < w - 1; x++) {
                        const idx = (y * w + x) * 4;
                        const alpha = tempData[idx + 3];
                        
                        if (alpha > 0 && alpha < 200) {
                            // Check neighbors
                            let transparentNeighbors = 0;
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    if (dx === 0 && dy === 0) continue;
                                    const nIdx = ((y + dy) * w + (x + dx)) * 4;
                                    if (tempData[nIdx + 3] === 0) transparentNeighbors++;
                                }
                            }
                            
                            // If mostly surrounded by transparent pixels, reduce alpha more
                            if (transparentNeighbors >= 4) {
                                data[idx + 3] = Math.floor(alpha * 0.3);
                            }
                        }
                    }
                }
                
                // Pass 3: Color decontamination - reduce white bleed on edges
                for (let i = 0; i < data.length; i += 4) {
                    const a = data[i+3];
                    if (a > 0 && a < 220) {
                        // Premultiply to remove white fringe
                        const factor = a / 255;
                        data[i] = Math.max(0, Math.floor(data[i] * factor));
                        data[i+1] = Math.max(0, Math.floor(data[i+1] * factor));
                        data[i+2] = Math.max(0, Math.floor(data[i+2] * factor));
                    }
                }
                
                ctx.putImageData(imgData, 0, 0);
                
                // Trim transparent borders
                const trimmed = trimCanvas(c);
                
                resolve(trimmed.toDataURL('image/png'));
            };
            img.src = imgSrc;
        });
    }
    
    function trimCanvas(canvas) {
        const ctx = canvas.getContext('2d');
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const w = canvas.width, h = canvas.height;
        let minX = w, minY = h, maxX = 0, maxY = 0;
        
        for (let y = 0; y < h; y++) {
            for (let x = 0; x < w; x++) {
                const alpha = data[(y * w + x) * 4 + 3];
                if (alpha > 10) {
                    minX = Math.min(minX, x);
                    minY = Math.min(minY, y);
                    maxX = Math.max(maxX, x);
                    maxY = Math.max(maxY, y);
                }
            }
        }
        
        // Add small padding
        const pad = 4;
        minX = Math.max(0, minX - pad);
        minY = Math.max(0, minY - pad);
        maxX = Math.min(w - 1, maxX + pad);
        maxY = Math.min(h - 1, maxY + pad);
        
        const trimW = maxX - minX + 1;
        const trimH = maxY - minY + 1;
        
        const trimmed = document.createElement('canvas');
        trimmed.width = trimW;
        trimmed.height = trimH;
        const tCtx = trimmed.getContext('2d');
        tCtx.drawImage(canvas, minX, minY, trimW, trimH, 0, 0, trimW, trimH);
        
        return trimmed;
    }
    
    async function processAll() {
        const status = document.getElementById('status');
        const output = document.getElementById('output');
        output.innerHTML = '';
        
        const results = {};
        
        for (const name of SPRITES) {
            status.textContent = `Processing: ${name}...`;
            
            const src = Assets[name];
            if (!src) {
                status.textContent = `MISSING: ${name}`;
                continue;
            }
            
            const processed = await removeWhiteBG(src, 35, 45);
            results[name] = processed;
            
            // Show preview
            const div = document.createElement('div');
            div.innerHTML = `<h3>${name}</h3>`;
            
            const img = new Image();
            img.src = processed;
            img.style.maxWidth = '200px';
            img.style.background = 'repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0 / 20px 20px';
            div.appendChild(img);
            output.appendChild(div);
        }
        
        // Generate the assets.js code
        status.textContent = 'Generating new assets.js...';
        
        let code = "const Assets = {};\n";
        
        // Add processed sprites
        for (const name of SPRITES) {
            if (results[name]) {
                code += `Assets['${name}'] = '${results[name]}';\n`;
            }
        }
        
        // Add non-sprite assets as-is
        const nonSprites = ['street_bg', 'loader_ram', 'victory_postcard_bg', 'greeting_card'];
        for (const name of nonSprites) {
            if (Assets[name]) {
                code += `Assets['${name}'] = '${Assets[name]}';\n`;
            }
        }
        
        // Create download
        const blob = new Blob([code], { type: 'text/javascript' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'assets.js';
        
        const dlBtn = document.createElement('button');
        dlBtn.textContent = '💾 Download processed assets.js';
        dlBtn.onclick = () => a.click();
        output.appendChild(dlBtn);
        
        status.textContent = `✅ Done! All ${SPRITES.length} sprites processed with background removal.`;
    }
    </script>
</body>
</html>
