<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background dark circle -->
  <circle cx="32" cy="32" r="31" fill="#1A0A00"/>
  <!-- Gold ring border -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#FFB800" stroke-width="2.5"/>
  <!-- Inner subtle glow ring -->
  <circle cx="32" cy="32" r="27" fill="none" stroke="rgba(255,184,0,0.25)" stroke-width="1"/>

  <!-- Sheep body (fluffy ellipse) -->
  <ellipse cx="30" cy="38" rx="14" ry="11" fill="#F5F0E8"/>
  <!-- Wool bumps on body -->
  <circle cx="22" cy="34" r="5" fill="#F5F0E8"/>
  <circle cx="30" cy="31" r="5.5" fill="#F5F0E8"/>
  <circle cx="38" cy="33" r="5" fill="#F5F0E8"/>

  <!-- Sheep head -->
  <circle cx="44" cy="26" r="8" fill="#D4C5A9"/>

  <!-- Left horn -->
  <path d="M39 20 C33 12 27 15 30 22" fill="none" stroke="#C9A050" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Right horn -->
  <path d="M49 19 C55 11 61 15 58 22" fill="none" stroke="#C9A050" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Eye white -->
  <circle cx="47" cy="24" r="3" fill="#FFFFFF"/>
  <!-- Pupil -->
  <circle cx="47.5" cy="24" r="1.5" fill="#1A1208"/>

  <!-- Muzzle -->
  <ellipse cx="51" cy="29" rx="3.5" ry="2.5" fill="#C9B090"/>

  <!-- Ears -->
  <path d="M37 22 C33 16 29 17 31 23" fill="#D4C5A9" stroke="#C9B090" stroke-width="0.8"/>

  <!-- Legs -->
  <line x1="22" y1="48" x2="20" y2="57" stroke="#A8917A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="28" y1="49" x2="27" y2="58" stroke="#A8917A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="35" y1="49" x2="36" y2="58" stroke="#A8917A" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="41" y1="48" x2="43" y2="57" stroke="#A8917A" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tail (fluffy) -->
  <circle cx="16" cy="36" r="4.5" fill="#F0EBE0"/>
  <circle cx="13" cy="35" r="3" fill="#F5F0E8"/>

  <!-- Gold star accent top-right -->
  <path d="M52 8 L53.5 11.5 L57 12 L54.5 14.5 L55.2 18 L52 16.3 L48.8 18 L49.5 14.5 L47 12 L50.5 11.5 Z"
        fill="#FFB800" opacity="0.9"/>
</svg>
